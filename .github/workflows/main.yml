name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"  # Maalin kasta 00:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: Platane/snk@v3
        with:
          github_user_name: Radimaan
          outputs: |
            github-contribution-grid-snake.svg

      - name: Move SVG to repo root
        run: mv github-contribution-grid-snake.svg ./github-contribution-grid-snake.svg

      - name: Commit & Push Snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake.svg
          git commit -m "Update Contribution Snake" || echo "No changes to commit"
          git push origin main
          
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
